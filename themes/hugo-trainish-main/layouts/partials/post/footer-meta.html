{{- $tagTerms := .GetTerms "tags" -}}
{{- $hasTags := and $tagTerms (gt (len $tagTerms) 0) -}}

{{- if $hasTags -}}
<footer class="post-footer">
  <div class="post-footer-row">
    {{- if $hasTags -}}
      {{- partial "terms.html" (dict "page" . "taxonomy" "tags") -}}
    {{- end -}}
  </div>
</footer>
{{- end -}}
